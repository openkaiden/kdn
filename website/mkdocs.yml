# Site metadata
site_name: kortex-cli Documentation
site_description: Command-line interface for launching and managing AI agents (Claude Code, Goose, Cursor) with custom configurations
site_author: Red Hat
site_url: https://kortex-hub.github.io/kortex-cli/

# Repository configuration
repo_name: kortex-hub/kortex-cli
repo_url: https://github.com/kortex-hub/kortex-cli
edit_uri: blob/main/README.md

# Copyright
copyright: Copyright &copy; 2026 Red Hat, Inc. Licensed under Apache License 2.0

# Documentation source
docs_dir: docs
site_dir: site

# Hooks for automatic README.md splitting
hooks:
  - hooks.py

# Theme configuration
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Red Hat Text
    code: Red Hat Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

# Plugins for SEO and functionality
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

# Markdown extensions for better rendering
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# SEO and social media optimization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kortex-hub/kortex-cli
      name: kortex-cli on GitHub
  generator: false  # Don't show "Made with Material for MkDocs"

